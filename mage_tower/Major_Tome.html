<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Major Tome Library — Owl Academy</title>
<script type="module" src="../scripts/auth-guard.js"></script>
<style>
  :root{--void:#06040f;--gold:#D4AF37;--purple:#8b5cf6;--cyan:#22d3ee;--ok:#34d399;--bad:#f87171;--warn:#fbbf24}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--void);color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;line-height:1.55;
       background:radial-gradient(ellipse at top,rgba(212,175,55,0.08),var(--void) 55%)}
  .mono{font-family:ui-monospace,"Fira Code",monospace}
  .secbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.55rem 1.1rem;background:rgba(8,12,22,.85);
          border-bottom:1px solid rgba(212,175,55,.25);position:sticky;top:0;z-index:30;backdrop-filter:blur(8px)}
  .seal{display:flex;align-items:center;gap:.5rem;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .seal .g{width:20px;height:20px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .who{font-size:.62rem;color:rgba(255,255,255,.42)}
  .btn{background:rgba(212,175,55,.14);color:var(--gold);border:1px solid rgba(212,175,55,.45);border-radius:6px;padding:.4rem .8rem;
       font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:.2s}
  .btn:hover{background:rgba(212,175,55,.26)} .btn[disabled]{opacity:.4;cursor:not-allowed}
  .btn.sm{padding:.25rem .55rem;font-size:.58rem;background:rgba(139,92,246,.16);color:var(--purple);border-color:rgba(139,92,246,.4)}
  header{text-align:center;padding:2rem 1rem .6rem}
  .kick{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(212,175,55,.7)}
  h1{font-weight:300;letter-spacing:.12em;color:#fff;margin-top:.4rem;font-size:1.6rem}h1 b{color:var(--gold)}
  .back{display:inline-block;margin-top:.8rem;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(139,92,246,.5);text-decoration:none}
  main{max-width:860px;margin:1.6rem auto;padding:0 1.1rem}
  .signbar{background:rgba(10,8,20,.6);border:1px solid rgba(139,92,246,.18);border-radius:10px;padding:.8rem 1rem;margin-bottom:1.3rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}
  .signbar label{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5)}
  select{background:#0c0a18;color:#e2e8f0;border:1px solid rgba(139,92,246,.3);border-radius:6px;padding:.4rem .55rem;font-size:.8rem;font-family:inherit}
  .tome{background:rgba(10,8,20,.55);border:1px solid rgba(139,92,246,.16);border-radius:11px;padding:1rem 1.2rem;margin-bottom:.9rem}
  .tome .top{display:flex;justify-content:space-between;align-items:center;gap:.6rem}
  .tome h3{font-size:1rem;color:#fff;font-weight:500}
  .tome .sum{font-size:.82rem;color:rgba(255,255,255,.55);margin-top:.25rem}
  .tome .meta{font-size:.64rem;color:rgba(255,255,255,.38);margin-top:.4rem}
  .state{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid;border-radius:999px;padding:.15em .6em;white-space:nowrap}
  .state.locked{color:var(--warn);border-color:var(--warn)} .state.pending{color:var(--cyan);border-color:var(--cyan)} .state.unlocked{color:var(--ok);border-color:var(--ok)}
  .row-act{margin-top:.6rem;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  .empty{text-align:center;color:rgba(255,255,255,.4);font-size:.85rem;padding:2rem;border:1px dashed rgba(139,92,246,.2);border-radius:12px}
  .hint{font-size:.66rem;color:rgba(255,255,255,.4)}
  .msg{font-size:.72rem;margin:.4rem 0 1rem}.msg.bad{color:var(--bad)}.msg.ok{color:var(--ok)}
</style>
</head>
<body>
<div class="secbar">
  <div class="seal"><span class="g">♛</span> Genesis-Sealed</div>
  <div class="who mono" id="who">authenticating…</div>
  <button class="btn sm" onclick="globalLogout()">Log out</button>
</div>
<header>
  <div class="kick">Mage Tower · Immutable Canon</div>
  <h1>Major Tome <b>Library</b></h1>
  <div><a class="back" href="Seal_Forge.html">← Seal Forge</a></div>
</header>

<main>
  <div class="signbar">
    <label>Request with</label>
    <select id="signtome"><option value="">— loading minor tomes —</option></select>
    <span class="hint">Your minor tome signs the unlock request; an Instructor combines it with theirs to grant access.</span>
  </div>
  <div class="msg" id="msg"></div>
  <div id="list"><div class="hint">Loading canon…</div></div>
</main>

<script type="module">
import { auth } from "../scripts/firebase/config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { resolveTier } from "../scripts/genesis-registrar.js";
import { listMinorTomes } from "../scripts/minor-tome.js";
import { listMajorTomes, requestUnlock, listMyRequests, listGrantsForStudent, verifyUnlockGrant } from "../scripts/major-tome.js";

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
let UID = null;

onAuthStateChanged(auth, async (u) => {
  if (!u) return; UID = u.uid;
  let tier = "ACOLYTE"; try { tier = await resolveTier(u.uid); } catch {}
  const sym = tier === "ARCHON" ? "♛" : tier === "INSTRUCTOR" ? "⬢" : "◯";
  $("who").textContent = `${sym} ${tier} · ${u.uid.slice(0,10)}…`;
  load();
});

async function load(){
  const [tomes, mine, reqs, grants] = await Promise.all([
    listMajorTomes().catch(()=>[]), listMinorTomes(UID).catch(()=>[]),
    listMyRequests(UID).catch(()=>[]), listGrantsForStudent(UID).catch(()=>[]),
  ]);
  const active = mine.filter(t => t.status === "active");
  $("signtome").innerHTML = active.length
    ? active.map(t => `<option value="${t.sealId}">${esc(t.label)} · ${t.sealId.slice(0,12)}…</option>`).join("")
    : `<option value="">— no active minor tomes (forge one) —</option>`;

  const reqByTome = {}; reqs.forEach(r => { reqByTome[r.majorTomeId] = r.status; });
  const grantByTome = {}; grants.forEach(g => { if (g.status === "granted") grantByTome[g.majorTomeId] = g; });

  if (!tomes.length) { $("list").innerHTML = `<div class="empty">The canon is empty. An Archon inscribes Major Tomes from the Unlock Console.</div>`; return; }

  const rows = await Promise.all(tomes.map(async (t) => {
    const grant = grantByTome[t.id];
    let stateHtml, actHtml = "";
    if (grant) {
      let verified = false; try { verified = (await verifyUnlockGrant(grant)).valid; } catch {}
      stateHtml = `<span class="state unlocked">Unlocked${verified?" ✓":""}</span>`;
      actHtml = `<span class="hint mono">signed off by ${esc(grant.issuerGenesisId||"?")} · ${esc(grant.issuerTier||"")}</span>`;
    } else if (reqByTome[t.id] === "pending") {
      stateHtml = `<span class="state pending">Requested · pending</span>`;
      actHtml = `<span class="hint">Awaiting an Instructor to combine seals.</span>`;
    } else {
      stateHtml = `<span class="state locked">Locked</span>`;
      actHtml = `<button class="btn" data-req="${t.id}">Request unlock</button>`;
    }
    return `<div class="tome"><div class="top"><h3>${esc(t.title)}</h3>${stateHtml}</div>
      ${t.summary?`<div class="sum">${esc(t.summary)}</div>`:""}
      <div class="meta mono">${esc(t.plane||"")} · requires ${esc(t.requiredTier||"ACOLYTE")} · immutable canon</div>
      <div class="row-act">${actHtml}</div></div>`;
  }));
  $("list").innerHTML = rows.join("");
  $("list").querySelectorAll("[data-req]").forEach(b => b.onclick = () => doRequest(b.dataset.req, b));
}

async function doRequest(majorTomeId, btn){
  const sid = $("signtome").value;
  if (!sid) { $("msg").className = "msg bad"; $("msg").textContent = "Forge an active minor tome first (Seal Forge)."; return; }
  btn.disabled = true; $("msg").className = "msg"; $("msg").textContent = "Signing request with your minor tome…";
  try { await requestUnlock(UID, majorTomeId, sid); $("msg").className = "msg ok"; $("msg").textContent = "Request sent — an Instructor will combine seals to unlock."; load(); }
  catch (e) { $("msg").className = "msg bad"; $("msg").textContent = e.message; btn.disabled = false; }
}
</script>
</body>
</html>
