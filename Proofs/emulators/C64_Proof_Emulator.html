<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROOF-64 Emulator — Owl Academy Proofs Workshop</title>

<!-- ── SECURITY: Genesis auth gate ── -->
<script type="module" src="../../scripts/auth-guard.js"></script>

<!-- math in proof bodies -->
<script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]}};</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  :root{ --void:#06040f; --c64bg:#3b30a8; --c64fg:#b1a7f4; --c64bd:#6c5cf0; --gold:#D4AF37; --purple:#8b5cf6; --ok:#34d399; --bad:#f87171; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--void);color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;
       background:radial-gradient(ellipse at top,rgba(108,92,240,0.12),var(--void) 60%)}
  .mono{font-family:ui-monospace,"Fira Code",monospace}
  .secbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.55rem 1.1rem;
          background:rgba(8,12,22,0.85);border-bottom:1px solid rgba(212,175,55,0.25);position:sticky;top:0;z-index:30;backdrop-filter:blur(8px)}
  .seal{display:flex;align-items:center;gap:.55rem;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .seal .glyph{width:22px;height:22px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(212,175,55,0.3)}
  .who{font-size:.64rem;color:rgba(255,255,255,.4);letter-spacing:.1em}
  .btn{background:rgba(108,92,240,0.18);color:#cfc7ff;border:1px solid rgba(108,92,240,0.5);border-radius:6px;
       padding:.4rem .9rem;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:.2s;font-family:inherit}
  .btn:hover{background:rgba(108,92,240,0.34)}
  header{text-align:center;padding:2rem 1rem 1rem}
  .kick{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--c64bd)}
  h1{font-weight:300;letter-spacing:.12em;color:#fff;margin-top:.4rem;font-size:1.5rem}
  h1 b{color:var(--c64bd)}
  .back{display:inline-block;margin-top:.7rem;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(108,92,240,0.7);text-decoration:none}
  main{max-width:780px;margin:1.4rem auto 3rem;padding:0 1.1rem}

  /* the machine */
  .case{background:linear-gradient(180deg,#d7d2c4,#b8b2a2);border-radius:16px;padding:1.1rem;box-shadow:0 16px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.5)}
  .bezel{background:#1a1730;border-radius:10px;padding:14px;border:2px solid #0d0b1c}
  .screen{background:var(--c64bg);border:10px solid var(--c64bd);border-radius:6px;min-height:340px;max-height:60vh;overflow:auto;
          padding:1rem 1.1rem;color:var(--c64fg);position:relative}
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.10) 0 1px,transparent 1px 3px);border-radius:6px}
  .screen pre.boot{font-family:ui-monospace,monospace;font-size:.8rem;white-space:pre-wrap;color:var(--c64fg)}
  .screen pre.boot .ok{color:#9affc0} .screen pre.boot .err{color:#ff9aa8} .screen pre.boot.err{color:#ff9aa8}
  .blink{animation:bl 1s steps(1) infinite}@keyframes bl{50%{opacity:0}}
  .cart-view{margin-top:1rem;border-top:1px dashed rgba(177,167,244,.4);padding-top:1rem}
  .cart-head{display:flex;justify-content:space-between;align-items:center;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
  .cart-id{color:#cfc7ff;font-family:ui-monospace,monospace}
  .cart-prio{border:1px solid;border-radius:999px;padding:.1em .55em;font-size:.58rem}
  .cart-title{color:#fff;font-size:1.25rem;margin:.5rem 0;font-weight:500}
  .cart-abstract{color:#d7d1ff;font-size:.86rem;margin-bottom:.8rem;font-style:italic}
  .cart-body{color:#e7e3ff;font-size:.88rem;line-height:1.7}
  .cart-body h2{font-size:1.05rem;color:#fff;margin:.8rem 0 .3rem} .cart-body h3{font-size:.95rem;color:#efeaff;margin:.7rem 0 .3rem}
  .cart-body code{background:rgba(0,0,0,.3);padding:.05em .3em;border-radius:3px;font-family:ui-monospace,monospace}
  .cart-note{margin-top:.9rem;font-size:.74rem;color:#ffd9a8;border:1px solid rgba(255,138,30,.4);border-radius:6px;padding:.5rem .7rem}
  .cart-foot{margin-top:1rem;font-size:.66rem;color:rgba(207,199,255,.55);font-family:ui-monospace,monospace}

  .deck{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1rem;align-items:center}
  .slot{flex:1;min-width:220px;border:1px dashed rgba(108,92,240,0.5);border-radius:8px;padding:.7rem .9rem;font-size:.72rem;color:rgba(255,255,255,.55)}
  .deck label{cursor:pointer}
  .status{margin-top:.7rem;font-size:.72rem;color:rgba(255,255,255,.5)}
  .status b.ok{color:var(--ok)} .status b.bad{color:var(--bad)} .status b.warn{color:#ffb454}
</style>
</head>
<body>
<div class="secbar">
  <div class="seal"><span class="glyph">♛</span> Genesis-Sealed</div>
  <div class="who mono" id="secWho">secure session · authenticating…</div>
  <button class="btn" onclick="globalLogout()">Log out</button>
</div>

<header>
  <div class="kick">Proofs Workshop · Emulator</div>
  <h1>PROOF-<b>64</b></h1>
  <a class="back" href="../index.html">← Workshop</a>
</header>

<main>
  <div class="case">
    <div class="bezel">
      <div class="screen" id="screen"><pre class="boot">booting…</pre></div>
    </div>
  </div>

  <div class="deck">
    <div class="slot">⬢ Cartridge slot — insert a <span class="mono">.crt.json</span> proof cartridge built in the
      <a href="../cartridge-makers/C64_Cartridge_Maker.html" style="color:var(--c64bd)">Cartridge Maker</a>.</div>
    <label class="btn" for="file">Insert cartridge…</label>
    <input id="file" type="file" accept=".json,.crt,application/json" hidden />
    <button class="btn" id="demo">Load demo</button>
    <button class="btn" id="eject">Eject</button>
  </div>
  <div class="status mono" id="status">No cartridge inserted.</div>
</main>

<!-- ── SECURITY identity reflect ── -->
<script type="module">
  import { auth } from "../../scripts/firebase/config.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { resolveTier } from "../../scripts/genesis-registrar.js";
  onAuthStateChanged(auth, async (u) => {
    if (!u) return;
    let t = "ACOLYTE"; try { t = await resolveTier(u.uid); } catch (_) {}
    const s = t === "ARCHON" ? "♛" : t === "INSTRUCTOR" ? "⬢" : "◯";
    document.getElementById("secWho").textContent = `secure session · ${s} ${t} · ${u.uid.slice(0,10)}…`;
  });
</script>

<!-- ── Emulator runtime (shared cartridge module) ── -->
<script type="module">
  import { bootCartridge, parseCartridge, sealCartridge } from "../cartridge.js";
  const MACHINE = "c64";
  const screen = document.getElementById("screen");
  const status = document.getElementById("status");

  function show(cart) {
    const r = bootCartridge({ cart, screenEl: screen, machine: MACHINE });
    if (r.status === "empty") status.innerHTML = "No cartridge inserted.";
    else if (r.status === "invalid") status.innerHTML = `<b class="bad">✗ invalid cartridge</b> — ${r.errors.join("; ")}`;
    else if (r.status === "quarantine") status.innerHTML = `<b class="warn">⚠ seal mismatch</b> — loaded read-only in quarantine.`;
    else status.innerHTML = `<b class="ok">✓ booted</b> — seal verified, cartridge trusted.`;
    if (window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise([screen]).catch(()=>{});
  }

  // empty boot
  show(null);

  document.getElementById("file").addEventListener("change", async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try { show(parseCartridge(await f.text())); }
    catch (err) { status.innerHTML = `<b class="bad">✗ could not read cartridge</b> — ${err.message}`; }
  });
  document.getElementById("eject").addEventListener("click", () => { show(null); });

  // built-in demo cartridge (sealed in-page) so the machine demonstrably runs; replace with your own later
  document.getElementById("demo").addEventListener("click", () => {
    show(sealCartridge({
      format: "owl-proof-cartridge", version: 1, machine: "c64",
      id: "demo-detailed-balance", title: "Demo · Detailed Balance Breaks",
      abstract: "A one-screen cartridge showing the Tesla-valve current is positive.",
      tags: ["markov","pump","demo"],
      author: { genesisId: "0xDEMO0000CARTRIDGE", tier: "ARCHON" },
      priority: "canonical",
      createdAt: new Date().toISOString(),
      payload: { kind: "proof", body:
        "## Claim\nFor a forward edge with valve $K_{ji}=K_{ij}e^{-\\lambda A_{ij}}$ and $\\pi_i>\\pi_j e^{-\\lambda A_{ij}}$:\n\n- $J_{ij}=K_{ij}(\\pi_i-\\pi_j e^{-\\lambda A_{ij}})>0$.\n\nSo **detailed balance fails** and the pump carries net forward current. *(Replace this demo with a real cartridge.)*",
        program: "" }
    }));
  });
</script>
</body>
</html>
