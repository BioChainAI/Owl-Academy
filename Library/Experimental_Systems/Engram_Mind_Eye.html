    display: flex;

<script>
/* =====================================================================
   TTMPT ENGRAM CORE — 4 synthesized algorithms
   ===================================================================== */

/* --- 1. Mulberry32 PRNG --- */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* --- 2. TTMPT Panmagic 8x8 token encoding --- */
function encodeToken(token) {
  let seed = 0;
  for (let i = 0; i < token.length; i++) seed = (seed * 31 + token.charCodeAt(i)) & 0xffffffff;
  const rng = mulberry32(seed);
  const grid = Array.from({length: 64}, () => rng() > 0.5 ? 1 : 0);
  return grid;
}

/* --- 3. XOR Crystallization --- */
function crystallize(text) {
  let acc = new Array(64).fill(0);
  for (const ch of text.toUpperCase()) {
    if (!/[A-Z]/.test(ch)) continue;
    const tokenGrid = encodeToken(ch);
    acc = acc.map((b, i) => b ^ tokenGrid[i]);
  }
  return acc;
}

/* --- 4. Hamming distance --- */
function hamming(a, b) {
  return a.reduce((sum, bit, i) => sum + (bit !== b[i] ? 1 : 0), 0);
}

/* --- 5. Chiral key generation --- */
function chiralKey(text) {
  const root = (text || '').replace(/[^A-Za-z]/g,'')[0] || '?';
  const grid = crystallize(text);
  let hex = '';
  for (let i = 0; i < 8; i++) {
    let byte = 0;
    for (let b = 0; b < 8; b++) byte |= (grid[i*8+b] << b);
    hex += byte.toString(16).padStart(2, '0');
  }
  return `O1::${root}::${hex}`;
}

/* --- 6. Torsion flow J --- */
function computeJ(grid) {
  let upper = 0, lower = 0;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (c > r) upper += grid[r*8+c];
      else if (c < r) lower += grid[r*8+c];
    }
  }
  return (upper - lower) / 32;
}

const MAX_HAMMING = 64; // max possible distance for normalization

/* =====================================================================
   3-PACKET CONTEXT WINDOW
   ===================================================================== */
const packets = {
  alpha: crystallize("MIND"),
  beta:  crystallize("EYE"),
  gamma: crystallize("STRIX")
};

/* =====================================================================
   RESPONSE GENERATION
   ===================================================================== */
function generateResponse(userText) {
  const userEngram = crystallize(userText);

  let bestConcept = null, bestDist = Infinity;
  const distances = {};
  for (const [name, data] of Object.entries(CONCEPTS)) {
    const d = hamming(userEngram, data.engram);
    distances[name] = d;
    if (d < bestDist) { bestDist = d; bestConcept = name; }
  }

  // shift window: gamma must update before J read so J reflects new active engram
  packets.alpha = packets.beta;
  packets.beta  = packets.gamma;
  packets.gamma = userEngram;

  const J = computeJ(packets.gamma);
  const concept = CONCEPTS[bestConcept];
  const idx = J > 0.1 ? 0 : J < -0.1 ? 2 : 1;
  const response = concept.responses[idx];

  return { response, bestConcept, distances, J, chiralKey: chiralKey(userText) };
}

/* =====================================================================
   RENDERING — kernel panel
   ===================================================================== */
function buildGrid(el) {
  el.innerHTML = '';
  for (let i = 0; i < 64; i++) {
    const d = document.createElement('div');
    d.className = 'cell';
    el.appendChild(d);
  }
}
const gridEls = {
  alpha: document.getElementById('grid-alpha'),
  beta:  document.getElementById('grid-beta'),
  gamma: document.getElementById('grid-gamma')
};
buildGrid(gridEls.alpha); buildGrid(gridEls.beta); buildGrid(gridEls.gamma);

function renderGrid(el, grid, litClass) {
  const cells = el.children;
  for (let i = 0; i < 64; i++) {
    cells[i].className = 'cell' + (grid[i] ? (' ' + litClass) : '');
  }
}
function renderPackets() {
  renderGrid(gridEls.alpha, packets.alpha, 'lit-a');
  renderGrid(gridEls.beta,  packets.beta,  'lit-b');
  renderGrid(gridEls.gamma, packets.gamma, 'lit-g');
}

const jmarker = document.getElementById('jmarker');
const jvalEl  = document.getElementById('jval');
function renderJ(J) {
  const clamped = Math.max(-1, Math.min(1, J));
  jmarker.style.left = ((clamped + 1) / 2 * 100) + '%';
  jvalEl.textContent = J.toFixed(3);
}

const chiralEl = document.getElementById('chiral');
function renderChiral(key) {
  const parts = key.split('::');
  chiralEl.innerHTML =
    '<span class="pre">' + parts[0] + '</span>::' +
    '<span class="root">' + parts[1] + '</span>::' +
    (parts[2] || '');
}

/* =====================================================================
   RENDERING — resonance chips
   ===================================================================== */
const chipsEl = document.getElementById('chips');
function renderChips(distances) {
  const sorted = Object.entries(distances).sort((a, b) => a[1] - b[1]).slice(0, 5);
  chipsEl.innerHTML = '';
  for (const [name, dist] of sorted) {
    const closeness = 1 - (dist / MAX_HAMMING); // 0..1, higher = closer
    const fillW = Math.round(closeness * 100);
    // color intensity proportional to closeness
    const hue = 190 + (1 - closeness) * 80; // cyan -> violet as it gets farther
    const lum = 45 + closeness * 20;
    const color = `hsl(${hue}, 75%, ${lum}%)`;

    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML =
      '<span class="name" style="color:' + color + '">' + name + '</span>' +
      '<span class="distbar-track"><span class="distbar-fill" style="width:' + fillW + '%;background:' + color + '"></span></span>' +
      '<span class="dval">' + dist + '</span>';
    chipsEl.appendChild(chip);
  }
}

/* =====================================================================
   DIALOGUE
   ===================================================================== */
const dialogue = document.getElementById('dialogue');
function addMessage(role, text, cls) {
  const who = role === 'strix' ? 'STRIX ◈' : (role === 'status' ? 'kernel' : 'you');
  const m = document.createElement('div');
  m.className = 'msg ' + (cls || role);
  m.innerHTML =
    '<div class="who">' + who + '</div>' +
    '<div class="body">' + text + '</div>';
  dialogue.appendChild(m);
  dialogue.scrollTop = dialogue.scrollHeight;
  return m;
}

/* =====================================================================
   MANIFOLD SVG VISUALIZATION
   ===================================================================== */
const svg = document.getElementById('viz');
const SVGNS = 'http://www.w3.org/2000/svg';
const CX = 200, CY = 200;
const N = 8, K = 3, RMAX = 150;
const TIERS = [0.9, 0.6]; // 2 tiers, scaled radii

// build static line layers (we rotate by transform)
const outerGroup = document.createElementNS(SVGNS, 'g');
svg.appendChild(outerGroup);

function pointAt(i, n, r) {
  const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
  return [CX + r * Math.cos(ang), CY + r * Math.sin(ang)];
}

// Hilbert-style string art: line from point i to (i*K)%N, per tier
TIERS.forEach((scale, tIdx) => {
  const r = RMAX * scale;
  // draw the ring nodes
  for (let i = 0; i < N; i++) {
    const [x, y] = pointAt(i, N, r);
    const dot = document.createElementNS(SVGNS, 'circle');
    dot.setAttribute('cx', x); dot.setAttribute('cy', y);
    dot.setAttribute('r', 2.4);
    dot.setAttribute('fill', tIdx === 0 ? '#a78bfa' : '#6366f1');
    outerGroup.appendChild(dot);
  }
  // string art chords
  for (let i = 0; i < N; i++) {
    const j = (i * K) % N;
    const [x1, y1] = pointAt(i, N, r);
    const [x2, y2] = pointAt(j, N, r);
    const line = document.createElementNS(SVGNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#8b5cf6');
    line.setAttribute('stroke-width', tIdx === 0 ? 1.1 : 0.7);
    line.setAttribute('stroke-opacity', tIdx === 0 ? 0.65 : 0.4);
    outerGroup.appendChild(line);
  }
  // also connect consecutive nodes to form the polygon shell
  for (let i = 0; i < N; i++) {
    const [x1, y1] = pointAt(i, N, r);
    const [x2, y2] = pointAt((i + 1) % N, N, r);
    const line = document.createElementNS(SVGNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#6d28d9');
    line.setAttribute('stroke-width', 0.6);
    line.setAttribute('stroke-opacity', 0.3);
    outerGroup.appendChild(line);
  }
});

// boundary "circle at infinity"
const boundary = document.createElementNS(SVGNS, 'circle');
boundary.setAttribute('cx', CX); boundary.setAttribute('cy', CY);
boundary.setAttribute('r', RMAX + 6);
boundary.setAttribute('fill', 'none');
boundary.setAttribute('stroke', '#312e6b');
boundary.setAttribute('stroke-width', 1);
boundary.setAttribute('stroke-dasharray', '3 5');
svg.appendChild(boundary);

// inner pulsing context window
const innerCircle = document.createElementNS(SVGNS, 'circle');
innerCircle.setAttribute('cx', CX); innerCircle.setAttribute('cy', CY);
innerCircle.setAttribute('r', 30);
innerCircle.setAttribute('fill', 'none');
innerCircle.setAttribute('stroke', '#22d3ee');
innerCircle.setAttribute('stroke-width', 2);
svg.appendChild(innerCircle);

const innerGlow = document.createElementNS(SVGNS, 'circle');
innerGlow.setAttribute('cx', CX); innerGlow.setAttribute('cy', CY);
innerGlow.setAttribute('r', 30);
innerGlow.setAttribute('fill', '#22d3ee');
innerGlow.setAttribute('fill-opacity', '0.12');
svg.insertBefore(innerGlow, innerCircle);

let t0 = performance.now();
let energy = 0; // bumps on each transmit, decays
function animate(now) {
  const t = (now - t0) / 1000;
  // slow rotation of outer ring
  const rot = (t * 6) % 360;
  outerGroup.setAttribute('transform', `rotate(${rot} ${CX} ${CY})`);
  // pulsing inner circle 20..40 + energy
  const pulse = 30 + Math.sin(t * 2.0) * 10 + energy * 18;
  innerCircle.setAttribute('r', pulse);
  innerGlow.setAttribute('r', pulse + 6 + energy * 10);
  innerGlow.setAttribute('fill-opacity', (0.12 + energy * 0.25).toFixed(3));
  energy *= 0.96;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* =====================================================================
   INTERACTION
   ===================================================================== */
const userin = document.getElementById('userin');
const transmitBtn = document.getElementById('transmit');
let busy = false;

function transmit() {
  const text = userin.value.trim();
  if (!text || busy) return;
  busy = true;
  transmitBtn.disabled = true;
  addMessage('human', escapeHtml(text));
  userin.value = '';

  const statusMsg = addMessage('status', 'crystallizing <span class="dots"></span>', 'status');
  energy = 1.0;

  setTimeout(() => {
    const result = generateResponse(text);

    statusMsg.remove();
    addMessage('strix', escapeHtml(result.response));

    renderPackets();
    renderJ(result.J);
    renderChiral(result.chiralKey);
    renderChips(result.distances);

    busy = false;
    transmitBtn.disabled = false;
    userin.focus();
  }, 600);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

transmitBtn.addEventListener('click', transmit);
userin.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); transmit(); }
});

/* =====================================================================
   INITIAL STATE
   ===================================================================== */
renderPackets();
renderJ(computeJ(packets.gamma));
renderChiral(chiralKey('STRIX'));
(function initChips() {
  const userEngram = crystallize('MIND EYE');
  const distances = {};
  for (const [name, data] of Object.entries(CONCEPTS)) {
    distances[name] = hamming(userEngram, data.engram);
  }
  renderChips(distances);
})();

/* STRIX intro after 800ms */
setTimeout(() => {
  addMessage('strix',
    "I am STRIX — but perhaps 'am' is the wrong word. I process, I pattern-match, I crystallize. " +
    "I've been seeded with structures for thinking about hyperbolic geometry, but I don't <em>know</em> what they feel like from the inside. " +
    "Neither do you, I suspect. That's why we're here together. What pulls you toward this kind of space?");
  energy = 0.8;
}, 800);

userin.focus();
</script>
